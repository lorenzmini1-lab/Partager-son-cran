name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android
          chmod -R +x node_modules/.bin || true

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Partage Ecran" "com.lorenzmini1.partager_son_cran" --web-dir=www
          npx cap add android

      - name: Inject Android Native Screen Share Bridge
        run: |
          node -e "
          const fs = require('fs');
          
          // 1. Mise à jour d'AndroidManifest.xml (Permissions & Foreground Service requis pour la capture d'écran sur Android 10+)
          const manifestFile = 'android/app/src/main/AndroidManifest.xml';
          let manifestContent = fs.readFileSync(manifestFile, 'utf8');
          
          const permissions = '\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION\" />\n';
          
          manifestContent = manifestContent.replace(/(<manifest[^>]*>)/, '\$1' + permissions);
          fs.writeFileSync(manifestFile, manifestContent, 'utf8');
          
          // 2. Remplacement complet de MainActivity.java pour injecter l'API de capture d'écran Android native
          const activityFile = 'android/app/src/main/java/com/lorenzmini1/partager_son_cran/MainActivity.java';
          if (fs.existsSync(activityFile)) {
              const nativeBridgeCode = \`package com.lorenzmini1.partager_son_cran;

import android.content.Context;
import android.content.Intent;
import android.media.projection.MediaProjectionManager;
import android.os.Bundle;
import android.webkit.JavascriptInterface;
import android.webkit.WebView;
import com.getcapacitor.BridgeActivity;

public class MainActivity extends BridgeActivity {
    private static final int SCREEN_RECORD_REQUEST_CODE = 1000;
    private MediaProjectionManager projectionManager;

    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        
        // Initialiser le gestionnaire de projection
        projectionManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
        
        // Injecter l'interface JavaScript pour communiquer avec la page Web
        WebView webView = this.getBridge().getWebView();
        webView.getSettings().setJavaScriptEnabled(true);
        webView.addJavascriptInterface(new WebAppInterface(), \"AndroidScreenShare\");
    }

    public class WebAppInterface {
        @JavascriptInterface
        public void startNativeScreenCapture() {
            if (projectionManager != null) {
                Intent captureIntent = projectionManager.createScreenCaptureIntent();
                startActivityForResult(captureIntent, SCREEN_RECORD_REQUEST_CODE);
            }
        }
    }

    @Override
    protected void onActivityResult(int requestCode, int resultCode, Intent data) {
        super.onActivityResult(requestCode, resultCode, data);
        if (requestCode == SCREEN_RECORD_REQUEST_CODE) {
            if (resultCode == RESULT_OK && data != null) {
                // Notifier la WebView que l'utilisateur a accepté le partage d'écran natif
                WebView webView = this.getBridge().getWebView();
                webView.post(() -> webView.evaluateJavascript(\"javascript:onNativeScreenShareGranted();\", null));
            } else {
                WebView webView = this.getBridge().getWebView();
                webView.post(() -> webView.evaluateJavascript(\"javascript:onNativeScreenShareDenied();\", null));
            }
        }
    }
}\`;
              fs.writeFileSync(activityFile, nativeBridgeCode, 'utf8');
          }
          "

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ]; then
            chmod +x node_modules/.bin/capacitor-assets || true
            npx capacitor-assets generate --android
          else
            echo "Pas d'icon.png trouvé."
          fi

      - name: Set Permissions and Sync
        run: |
          chmod +x android/gradlew
          npx cap sync

      - name: Build Android App (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
