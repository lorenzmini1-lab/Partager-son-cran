name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android
          # On donne les permissions à tous les outils Node locaux installés
          chmod -R +x node_modules/.bin || true

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Partage Ecran" "com.lorenzmini1.partager_son_cran" --web-dir=www
          npx cap add android

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ]; then
            # On s'assure que l'outil de génération a les droits d'exécution
            chmod +x node_modules/.bin/capacitor-assets || true
            npx capacitor-assets generate --android
          else
            echo "Pas d'icon.png trouvé."
          fi

      - name: Set Permissions and Sync
        run: |
          # On force les permissions d'exécution sur le compilateur Gradle d'Android
          chmod +x android/gradlew
          npx cap sync

      - name: Build Android App (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk