name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android
          chmod -R +x node_modules/.bin || true

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Partage Ecran" "com.lorenzmini1.partager_son_cran" --web-dir=www
          npx cap add android

      - name: Inject Android Native Screen Share Bridge & Service
        run: |
          # 1. Configuration de l'AndroidManifest (Permissions strictes de premier plan et de veille)
          node -e "
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let content = fs.readFileSync(file, 'utf8');
          
          const permissions = '\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION\" />\n' +
            '    <uses-permission android:name=\"android.permission.WAKE_LOCK\" />\n' +
            '    <uses-permission android:name=\"android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS\" />\n';
          
          content = content.replace(/(<manifest[^>]*>)/, '\$1' + permissions);
          
          const serviceDefinition = '\n' +
            '        <service\n' +
            '            android:name=\"com.lorenzmini1.partager_son_cran.ScreenCaptureService\"\n' +
            '            android:foregroundServiceType=\"mediaProjection\"\n' +
            '            android:enabled=\"true\"\n' +
            '            android:exported=\"false\" />\n';
          
          content = content.replace('</application>', serviceDefinition + '    </application>');
          fs.writeFileSync(file, content, 'utf8');
          "
          
          # 2. Création du service de premier plan obligatoire (ScreenCaptureService.java)
          mkdir -p android/app/src/main/java/com/lorenzmini1/partager_son_cran/
          cat << 'EOF' > android/app/src/main/java/com/lorenzmini1/partager_son_cran/ScreenCaptureService.java
          package com.lorenzmini1.partager_son_cran;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class ScreenCaptureService extends Service {
              private static final String CHANNEL_ID = "ScreenCaptureChannel";

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  Notification notification = new NotificationCompat.Builder(this, CHANNEL_ID)
                          .setContentTitle("Partage d'écran actif")
                          .setContentText("L'application capture l'écran en tâche de fond.")
                          .setSmallIcon(android.R.drawable.ic_media_play)
                          .setOngoing(true)
                          .build();
                  
                  startForeground(1, notification);
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                              CHANNEL_ID,
                              "Service de Capture",
                              NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          EOF

          # 3. Configuration de MainActivity.java (Correction des visibilités public)
          cat << 'EOF' > android/app/src/main/java/com/lorenzmini1/partager_son_cran/MainActivity.java
          package com.lorenzmini1.partager_son_cran;

          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Bitmap;
          import android.graphics.PixelFormat;
          import android.hardware.display.DisplayManager;
          import android.hardware.display.VirtualDisplay;
          import android.media.Image;
          import android.media.ImageReader;
          import android.media.projection.MediaProjection;
          import android.media.projection.MediaProjectionManager;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Base64;
          import android.util.DisplayMetrics;
          import android.webkit.JavascriptInterface;
          import android.webkit.PermissionRequest;
          import android.webkit.WebChromeClient;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          import java.io.ByteArrayOutputStream;
          import java.nio.ByteBuffer;

          public class MainActivity extends BridgeActivity {
              private static final int SCREEN_CAPTURE_REQUEST_CODE = 2000;
              private MediaProjectionManager projectionManager;
              private MediaProjection mediaProjection;
              private VirtualDisplay virtualDisplay;
              private ImageReader imageReader;
              private Handler handler = new Handler(Looper.getMainLooper());
              private boolean isCapturing = false;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  projectionManager = (Context.MEDIA_PROJECTION_SERVICE != null) ? (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE) : null;
                  
                  WebView webView = this.getBridge().getWebView();
                  webView.getSettings().setJavaScriptEnabled(true);
                  webView.getSettings().setDomStorageEnabled(true);
                  webView.addJavascriptInterface(new WebAppInterface(), "AndroidScreenShare");
                  
                  webView.getSettings().setMediaPlaybackRequiresUserGesture(false);
                  
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onPermissionRequest(final PermissionRequest request) {
                          runOnUiThread(() -> request.grant(request.getResources()));
                      }
                  });
              }

              // CORRECTION : Changement de 'protected' à 'public' pour correspondre à BridgeActivity
              @Override
              public void onPause() {
                  super.onPause();
              }

              @Override
              public void onResume() {
                  super.onResume();
              }

              public class WebAppInterface {
                  @JavascriptInterface
                  public void requestScreenCapturePermission() {
                      if (projectionManager != null) {
                          startActivityForResult(projectionManager.createScreenCaptureIntent(), SCREEN_CAPTURE_REQUEST_CODE);
                      }
                  }

                  @JavascriptInterface
                  public void stopScreenCapture() {
                      stopCapture();
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == SCREEN_CAPTURE_REQUEST_CODE && resultCode == RESULT_OK && data != null) {
                      Intent serviceIntent = new Intent(this, ScreenCaptureService.class);
                      startForegroundService(serviceIntent);

                      mediaProjection = projectionManager.getMediaProjection(resultCode, data);
                      
                      mediaProjection.registerCallback(new MediaProjection.Callback() {
                          @Override
                          public void onStop() {
                              stopCapture();
                          }
                      }, handler);

                      startCapture();
                      getBridge().getWebView().post(() -> getBridge().getWebView().evaluateJavascript("javascript:onNativeScreenShareGranted();", null));
                  } else if (requestCode == SCREEN_CAPTURE_REQUEST_CODE) {
                      getBridge().getWebView().post(() -> getBridge().getWebView().evaluateJavascript("javascript:onNativeScreenShareDenied();", null));
                  }
              }

              private void startCapture() {
                  if (mediaProjection == null) return;
                  
                  DisplayMetrics metrics = new DisplayMetrics();
                  getWindowManager().getDefaultDisplay().getMetrics(metrics);
                  int width = 480;
                  int height = (int) (width * ((float) metrics.heightPixels / metrics.widthPixels));
                  int density = metrics.densityDpi;

                  imageReader = ImageReader.newInstance(width, height, PixelFormat.RGBA_8888, 2);
                  virtualDisplay = mediaProjection.createVirtualDisplay(
                          "ScreenCapture",
                          width, height, density,
                          DisplayManager.VIRTUAL_DISPLAY_FLAG_AUTO_MIRROR,
                          imageReader.getSurface(), null, null
                  );

                  isCapturing = true;
                  handler.post(captureRunnable);
              }

              private Runnable captureRunnable = new Runnable() {
                  @Override
                  public void run() {
                      if (!isCapturing) return;
                      captureFrameAndSend();
                      handler.postDelayed(this, 200);
                  }
              };

              private void captureFrameAndSend() {
                  if (imageReader == null) return;
                  try (Image image = imageReader.acquireLatestImage()) {
                      if (image == null) return;
                      
                      Image.Plane[] planes = image.getPlanes();
                      ByteBuffer buffer = planes[0].getBuffer();
                      int pixelStride = planes[0].getPixelStride();
                      int rowStride = planes[0].getRowStride();
                      int rowPadding = rowStride - pixelStride * image.getWidth();

                      Bitmap bitmap = Bitmap.createBitmap(
                              image.getWidth() + rowPadding / pixelStride,
                              image.getHeight(),
                              Bitmap.Config.ARGB_8888
                      );
                      bitmap.copyPixelsFromBuffer(buffer);

                      ByteArrayOutputStream baos = new ByteArrayOutputStream();
                      bitmap.compress(Bitmap.CompressFormat.JPEG, 40, baos);
                      byte[] byteArray = baos.toByteArray();
                      String base64Image = Base64.encodeToString(byteArray, Base64.NO_WRAP);

                      WebView webView = this.getBridge().getWebView();
                      webView.post(() -> webView.evaluateJavascript("javascript:onNativeFrame('" + base64Image + "');", null));
                      
                      bitmap.recycle();
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              private void stopCapture() {
                  isCapturing = false;
                  if (virtualDisplay != null) {
                      virtualDisplay.release();
                      virtualDisplay = null;
                  }
                  if (imageReader != null) {
                      imageReader.close();
                      imageReader = null;
                  }
                  if (mediaProjection != null) {
                      mediaProjection.stop();
                      mediaProjection = null;
                  }
                  Intent serviceIntent = new Intent(this, ScreenCaptureService.class);
                  stopService(serviceIntent);
              }
          }
          EOF

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ]; then
            chmod +x node_modules/.bin/capacitor-assets || true
            npx capacitor-assets generate --android
          else
            echo "Pas d'icon.png trouvé."
          fi

      - name: Set Permissions and Sync
        run: |
          chmod +x android/gradlew
          npx cap sync

      - name: Build Android App (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk