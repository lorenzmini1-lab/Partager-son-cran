name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/android
          chmod -R +x node_modules/.bin || true

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/
          cp app.js www/

      - name: Initialize Capacitor Android
        run: |
          npx cap init "Partage Ecran" "com.lorenzmini1.partager_son_cran" --web-dir=www
          npx cap add android

      - name: Inject Android Permissions & Services
        run: |
          node -e "
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let content = fs.readFileSync(file, 'utf8');
          
          // 1. Déclarations des permissions de sécurité requises
          const permissions = '\n' +
            '    <uses-permission android:name=\"android.permission.CAMERA\" />\n' +
            '    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n' +
            '    <uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\" />\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />\n' +
            '    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION\" />\n';
          
          // Insertion propre des permissions juste après <manifest ...>
          content = content.replace(/(<manifest[^>]*>)/, '\$1' + permissions);
          
          // 2. Déclaration du service requis par Android pour la projection de médias en tâche de fond
          const serviceDefinition = '\n' +
            '        <service\n' +
            '            android:name=\"com.ionicframework.capacitor.CordovaInterfaceService\"\n' +
            '            android:enabled=\"true\"\n' +
            '            android:exported=\"false\" />\n';
          
          // Insertion du service juste avant la fermeture de la balise </application>
          content = content.replace('</application>', serviceDefinition + '    </application>');
          
          fs.writeFileSync(file, content, 'utf8');
          "

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ]; then
            chmod +x node_modules/.bin/capacitor-assets || true
            npx capacitor-assets generate --android
          else
            echo "Pas d'icon.png trouvé."
          fi

      - name: Set Permissions and Sync
        run: |
          chmod +x android/gradlew
          npx cap sync

      - name: Build Android App (APK)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
